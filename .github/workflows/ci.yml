name: CI - Run Unit Tests

on:
  push:
    branches: [ "main", "master", "dev", "develop" ]
  pull_request:
    branches: [ "main", "master", "dev", "develop" ]

jobs:
  # -------------------------------------------------------------
  # 1. FRONTEND UNIT TESTS
  # -------------------------------------------------------------
  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Frontend Tests
        run: npm run test --if-present

  # -------------------------------------------------------------
  # 2. BACKEND SERVICES TESTS
  # -------------------------------------------------------------
  services-tests:
    name: Backend Services Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test Root Services / Sub-Services
        run: |
          # 1. Check root services folder if package.json exists
          if [ -f "services/package.json" ]; then
            echo "Testing root services..."
            cd services
            if [ -f package-lock.json ]; then npm ci; else npm install; fi
            npm run test --if-present
            cd ..
          fi

          # 2. Loop through all subservices (e.g. services/api-gateway)
          for dir in services/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Testing service in: $dir"
              cd "$dir"
              if [ -f package-lock.json ]; then npm ci; else npm install; fi
              npm run test --if-present
              cd - > /dev/null
            fi
          done

  # -------------------------------------------------------------
  # 3. QA TESTS
  # -------------------------------------------------------------
  qa-tests:
    name: QA Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run QA Tests
        run: |
          if [ -f "qa-tests/package.json" ]; then
            cd qa-tests
            if [ -f package-lock.json ]; then npm ci; else npm install; fi
            npm run test --if-present
          else
            echo "No package.json found in qa-tests folder, skipping."
          fi
