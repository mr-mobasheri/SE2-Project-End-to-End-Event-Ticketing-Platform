version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_here
      POSTGRES_DB: ticketing_db
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"