version: '3.8'

networks:
  ticketing-network:
    driver: bridge

services:
  # 1. Database (PostgreSQL)
  postgres:
    image: postgres:14-alpine
    container_name: ticketing-postgres
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: postgres_admin
      POSTGRES_PASSWORD: TicketingSecurePass123
    ports:
      - "5432:5432"
    networks:
      - ticketing-network

# 2. Transient Lock Store (Redis)
  redis:
    image: redis:7-alpine
    container_name: ticketing-redis
    ports:
      - "6379:6379"
    networks:
      - ticketing-network

  # 3. Message Broker (Zookeeper & Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: ticketing-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - ticketing-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: ticketing-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ticketing-network

  # 4. Telemetry (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    container_name: ticketing-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - ticketing-network

  # --- Microservices (6 Services) ---
  api-gateway:
    build: ../services/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - ticketing-network

  identity-service:
    build: ../services/identity-service
    container_name: identity-service
    ports:
      - "3001:3001"
    networks:
      - ticketing-network

  reservation-engine:
    build: ../services/reservation-engine
    container_name: reservation-engine
    restart: on-failure # اضافه کردن این خط
    ports:
      - "3002:3002"
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - redis
      - kafka
    networks:
      - ticketing-network

  catalog-service:
    build: ../services/catalog-service
    container_name: catalog-service
    ports:
      - "3003:3003"
    environment: # اضافه کردن این دو خط برای آدرس‌دهی مستقیم دیتابیس
      - DATABASE_URL=postgresql://postgres_admin:TicketingSecurePass123@ticketing-postgres:5432/ticketing
    depends_on:
      - postgres
    networks:
      - ticketing-network

  billing-service:
    build: ../services/billing-service
    container_name: billing-service
    restart: on-failure # اضافه کردن این خط
    ports:
      - "3004:3004"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    networks:
      - ticketing-network

  notification-service:
    build: ../services/notification-service
    container_name: notification-service
    restart: on-failure # اضافه کردن این خط
    ports:
      - "3005:3005"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    networks:
      - ticketing-network